project_id = "amipjjmphblfxpghjnel"

# Self-invoking functions need verify_jwt = false because this project's
# Supabase gateway rejects the service-role bearer at the verify_jwt layer.
# Auth enforcement lives in supabase/functions/_shared/internalAuth.ts.
# See CLAUDE.md "Edge Function self-invocation auth" for the full pattern.
[functions.ts-pull-candidates]
verify_jwt = false

# ts-bulk-reevaluate self-invokes for chunked re-eval (same pattern as
# ts-pull-candidates).
[functions.ts-bulk-reevaluate]
verify_jwt = false

# ts-evaluate-candidate is called both from the UI (user JWT) and from
# ts-bulk-reevaluate (server-to-server, service-role bearer + internal-secret).
# Gateway can't accept the service-role path, so move JWT verify into the
# function. internalAuth still enforces user-JWT validity for the UI path.
[functions.ts-evaluate-candidate]
verify_jwt = false

# Phase 3.6 functions. ts-final-review uses EdgeRuntime.waitUntil for the
# Anthropic call; ts-packet-generate / ts-final-review-packet make repeated
# CloudConvert calls that exceed the gateway's verify_jwt latency budget.
# All three use requireInternalOrUserAuth.
[functions.ts-final-review]
verify_jwt = false

[functions.ts-packet-generate]
verify_jwt = false

[functions.ts-final-review-packet]
verify_jwt = false
