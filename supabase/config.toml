project_id = "amipjjmphblfxpghjnel"

# Self-invoking functions need verify_jwt = false because this project's
# Supabase gateway rejects the service-role bearer at the verify_jwt layer.
# Auth enforcement lives in supabase/functions/_shared/internalAuth.ts.
# See CLAUDE.md "Edge Function self-invocation auth" for the full pattern.
[functions.ts-pull-candidates]
verify_jwt = false

# ts-bulk-reevaluate self-invokes for chunked re-eval (same pattern as
# ts-pull-candidates).
[functions.ts-bulk-reevaluate]
verify_jwt = false

# ts-evaluate-candidate is called both from the UI (user JWT) and from
# ts-bulk-reevaluate (server-to-server, service-role bearer + internal-secret).
# Gateway can't accept the service-role path, so move JWT verify into the
# function. internalAuth still enforces user-JWT validity for the UI path.
[functions.ts-evaluate-candidate]
verify_jwt = false

# Phase 3.6 functions. ts-final-review uses EdgeRuntime.waitUntil for the
# Anthropic call; ts-packet-generate / ts-final-review-packet make repeated
# CloudConvert calls that exceed the gateway's verify_jwt latency budget.
# All three use requireInternalOrUserAuth.
[functions.ts-final-review]
verify_jwt = false

[functions.ts-packet-generate]
verify_jwt = false

[functions.ts-final-review-packet]
verify_jwt = false

# Phase 3.8 cron + watchdog functions. All called by pg_cron via net.http_post
# with x-internal-secret header. requireInternalOrUserAuth handles auth in-fn.
[functions.ts-cron-scheduled-pulls]
verify_jwt = false

[functions.ts-cron-pull-watchdog]
verify_jwt = false

[functions.ts-cron-reeval-watchdog]
verify_jwt = false

[functions.ts-cron-final-review-watchdog]
verify_jwt = false

[functions.ts-cron-storage-cleanup]
verify_jwt = false

[functions.ts-cron-monthly-spend-reset]
verify_jwt = false

# Phase 3.9 standalone notification function. Called by ts-pull-candidates
# self-invoke at round-completion (server-to-server with internal-secret).
[functions.ts-send-pull-notification]
verify_jwt = false

# Phase 4.3-port: brief PDF parser. User-invoked synchronous from the Brief
# page; no self-invoke. Default verify_jwt=true is correct here; the explicit
# entry exists for clarity since every prior vs-* / ts-* function flipped it
# off and this is the first vs-* function that keeps it on.
[functions.vs-parse-brief]
verify_jwt = true

# Phase 4.4-port: sourcing-sheet parser (XLSX / CSV / PDF). User-invoked
# synchronous from the SheetUpload page; no self-invoke. Same explicit
# verify_jwt = true pattern as vs-parse-brief.
[functions.vs-parse-sheet]
verify_jwt = true

# Phase 4.5-port: AI-driven venue research. User-invoked from the
# Researching page; the handshake returns immediately and the AI work
# runs inside EdgeRuntime.waitUntil. No self-invoke. verify_jwt = true
# matches the vs-parse-* sibling pattern; the explicit entry is for
# clarity since EdgeRuntime.waitUntil might look like a self-invoke
# candidate at a glance.
[functions.vs-research-venues]
verify_jwt = true

# Phase 4.7.2-port: two-pass AI compile (fill + overview). User-invoked
# from the Compiling page; same EdgeRuntime.waitUntil + Realtime pattern
# as vs-research-venues. No self-invoke. verify_jwt = true matches the
# vs-parse-* / vs-research-venues sibling pattern.
[functions.vs-compile-summaries]
verify_jwt = true

# Phase 4.8.2-port: Google Slides deck generation. User-invoked from the
# Generating page; same EdgeRuntime.waitUntil + Realtime pattern as
# vs-compile-summaries. No self-invoke. verify_jwt = true matches the
# vs-* sibling pattern.
[functions.vs-generate-deck]
verify_jwt = true
